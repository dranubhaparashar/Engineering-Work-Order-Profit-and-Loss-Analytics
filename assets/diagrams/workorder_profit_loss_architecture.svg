<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Engineering Work Order Profit and Loss Analytics architecture</title>
  <desc id="desc">Architecture showing source data, ingestion and quality, financial metric engine, work-order analytical mart, presentation, and governed deployment paths.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f4c81"/>
      <stop offset="100%" stop-color="#1570a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#14324a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2d6f9f"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 17px Arial, Helvetica, sans-serif; fill: #dcefff; }
      .box-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #16324a; }
      .box-text { font: 400 15px Arial, Helvetica, sans-serif; fill: #40556a; }
      .small-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #16324a; }
      .step { font: 700 15px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .footer-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #17344c; }
      .footer-text { font: 400 14px Arial, Helvetica, sans-serif; fill: #486174; }
    </style>
  </defs>

  <rect width="1440" height="820" rx="26" fill="url(#bg)"/>
  <rect x="0" y="0" width="1440" height="125" rx="26" fill="url(#header)"/>
  <rect x="0" y="96" width="1440" height="29" fill="url(#header)"/>
  <text x="720" y="52" text-anchor="middle" class="title">Engineering Work Order Profit and Loss Analytics</text>
  <text x="720" y="86" text-anchor="middle" class="subtitle">Synthetic public MVP with a governed Snowflake deployment path</text>

  <g filter="url(#shadow)">
    <rect x="55" y="190" width="235" height="290" rx="20" fill="#ffffff" stroke="#b8d4e8" stroke-width="2"/>
    <rect x="330" y="190" width="235" height="290" rx="20" fill="#ffffff" stroke="#b8d4e8" stroke-width="2"/>
    <rect x="605" y="190" width="235" height="290" rx="20" fill="#ffffff" stroke="#8ec2df" stroke-width="2.5"/>
    <rect x="880" y="190" width="235" height="290" rx="20" fill="#ffffff" stroke="#b8d4e8" stroke-width="2"/>
    <rect x="1155" y="190" width="230" height="290" rx="20" fill="#ffffff" stroke="#b8d4e8" stroke-width="2"/>
  </g>

  <circle cx="87" cy="222" r="18" fill="#1570a6"/><text x="87" y="228" text-anchor="middle" class="step">1</text>
  <circle cx="362" cy="222" r="18" fill="#1570a6"/><text x="362" y="228" text-anchor="middle" class="step">2</text>
  <circle cx="637" cy="222" r="18" fill="#1570a6"/><text x="637" y="228" text-anchor="middle" class="step">3</text>
  <circle cx="912" cy="222" r="18" fill="#1570a6"/><text x="912" y="228" text-anchor="middle" class="step">4</text>
  <circle cx="1187" cy="222" r="18" fill="#1570a6"/><text x="1187" y="228" text-anchor="middle" class="step">5</text>

  <text x="172" y="273" text-anchor="middle" class="box-title">Source Data</text>
  <text x="82" y="315" class="box-text">• Work-order master</text>
  <text x="82" y="348" class="box-text">• Work-unit revenue</text>
  <text x="82" y="381" class="box-text">• DWR labor events</text>
  <text x="82" y="414" class="box-text">• Billing and other costs</text>
  <text x="82" y="447" class="box-text">• Rates and milestones</text>

  <text x="447" y="273" text-anchor="middle" class="box-title">Ingestion &amp; Quality</text>
  <text x="357" y="315" class="box-text">• Required-file checks</text>
  <text x="357" y="348" class="box-text">• Date and type parsing</text>
  <text x="357" y="381" class="box-text">• Duplicate detection</text>
  <text x="357" y="414" class="box-text">• Orphan and value checks</text>
  <text x="357" y="447" class="box-text">• Standardized data frames</text>

  <text x="722" y="273" text-anchor="middle" class="box-title">Financial Metric Engine</text>
  <text x="632" y="315" class="box-text">• Estimated and billed revenue</text>
  <text x="632" y="348" class="box-text">• Labor and other cost</text>
  <text x="632" y="381" class="box-text">• Forecast profit and margin</text>
  <text x="632" y="414" class="box-text">• Travel and rework signals</text>
  <text x="632" y="447" class="box-text">• Explainable risk reasons</text>

  <text x="997" y="273" text-anchor="middle" class="box-title">Analytical Mart</text>
  <text x="907" y="315" class="box-text">• One row per work order</text>
  <text x="907" y="348" class="box-text">• Portfolio aggregation</text>
  <text x="907" y="381" class="box-text">• Lifecycle breakdowns</text>
  <text x="907" y="414" class="box-text">• Target-margin variance</text>
  <text x="907" y="447" class="box-text">• Download-ready summaries</text>

  <text x="1270" y="273" text-anchor="middle" class="box-title">Presentation</text>
  <text x="1182" y="315" class="box-text">• Streamlit portfolio KPIs</text>
  <text x="1182" y="348" class="box-text">• Work-order drill-down</text>
  <text x="1182" y="381" class="box-text">• Labor and lifecycle views</text>
  <text x="1182" y="414" class="box-text">• Rate scenarios</text>
  <text x="1182" y="447" class="box-text">• CSV exports</text>

  <line x1="290" y1="335" x2="325" y2="335" stroke="#2d6f9f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="565" y1="335" x2="600" y2="335" stroke="#2d6f9f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="840" y1="335" x2="875" y2="335" stroke="#2d6f9f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1115" y1="335" x2="1150" y2="335" stroke="#2d6f9f" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="95" y="555" width="570" height="175" rx="22" fill="#ffffff" stroke="#a9cce2" stroke-width="2"/>
    <rect x="775" y="555" width="570" height="175" rx="22" fill="#ffffff" stroke="#a9cce2" stroke-width="2"/>
  </g>

  <rect x="95" y="555" width="570" height="48" rx="22" fill="#e5f3fb"/>
  <rect x="95" y="581" width="570" height="22" fill="#e5f3fb"/>
  <text x="380" y="587" text-anchor="middle" class="footer-title">Public Synthetic Application Path</text>
  <text x="130" y="635" class="footer-text">Deterministic CSV generator → pandas processing → Streamlit dashboard</text>
  <text x="130" y="669" class="footer-text">Safe for demonstration, documentation, reproducibility, and portfolio review</text>
  <text x="130" y="703" class="footer-text">No confidential customer, employee, operational, or financial records</text>

  <rect x="775" y="555" width="570" height="48" rx="22" fill="#e8eefb"/>
  <rect x="775" y="581" width="570" height="22" fill="#e8eefb"/>
  <text x="1060" y="587" text-anchor="middle" class="footer-title">Governed Snowflake Deployment Path</text>
  <text x="810" y="635" class="footer-text">Approved source systems → curated tables/views → governed analytical layer</text>
  <text x="810" y="669" class="footer-text">Role-based access, validated formulas, secure secrets, and audit controls</text>
  <text x="810" y="703" class="footer-text">Streamlit in Snowflake or another approved business-intelligence interface</text>

  <rect x="210" y="760" width="1020" height="38" rx="19" fill="#d8e9f5"/>
  <text x="720" y="785" text-anchor="middle" class="small-title">Cross-cutting controls: configurable rates • risk thresholds • tests • data quality • privacy • governance</text>
</svg>
